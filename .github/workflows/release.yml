name: Release

# Publica a npm en cada push a main, pero SOLO los paquetes cuya versión local
# no existe todavía en el registry (publish-on-version-bump). Releasear =
# bumpear "version" en el package.json del paquete + push a main.
#
# Requiere el secret NPM_TOKEN (granular access token de npmjs.com con permiso
# Read and write sobre estos paquetes). Ver PUBLISHING.md.

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run validate:examples
      - name: Publish packages with a new version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # Orden importa: schema primero, el validator depende de él.
        run: |
          for dir in packages/schema packages/validator; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            published=$(npm view "$name@$version" version 2>/dev/null || true)
            if [ "$published" = "$version" ]; then
              echo "⏭  $name@$version ya está en npm — skip"
            else
              echo "🚀 Publicando $name@$version"
              npm publish -w "$name"
            fi
          done
